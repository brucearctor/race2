name: race2_app
description: race2 — OBD-II live vehicle data on your Pixel phone via USB OTG
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  usb_serial: ^0.5.0       # USB host / OTG serial communication
  fl_chart: ^0.68.0        # Animated arc gauge + line charts
  provider: ^6.1.2         # State management

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
